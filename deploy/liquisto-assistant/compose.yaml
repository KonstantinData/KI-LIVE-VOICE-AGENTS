services:
  liquisto-local-assistant:
    build:
      context: ../..
      dockerfile: deploy/liquisto-assistant/Dockerfile
    environment:
      APP_ENV: production
      LIQUISTO_ASSISTANT_SERVICE_TOKEN: ${LIQUISTO_ASSISTANT_SERVICE_TOKEN:?required}
      LIQUISTO_ASSISTANT_LLM_BASE_URL: http://liquisto-assistant-llm:11434/v1
      LIQUISTO_ASSISTANT_LLM_MODEL: ${LIQUISTO_ASSISTANT_LLM_MODEL:?required}
      LIQUISTO_ASSISTANT_LLM_TIMEOUT_SECONDS: "60"
      LIQUISTO_ASSISTANT_LLM_MAX_OUTPUT_TOKENS: "1200"
    networks:
      - liquisto-assistant
    read_only: true
    tmpfs:
      - /tmp:size=16m,noexec,nosuid
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2)"
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  liquisto-assistant:
    external: true
    name: liquisto-assistant
